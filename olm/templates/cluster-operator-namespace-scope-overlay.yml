#@ load("@ytt:data", "data")
#@ load("@ytt:overlay", "overlay")
#@ deployment = overlay.subset({"kind": "Deployment"})
#@ cluster_operator = overlay.subset({"metadata": {"name": "rabbitmq-cluster-operator"}})
#@overlay/match by=overlay.and_op(deployment, cluster_operator),expects="1+"
---
spec:
  template:
    spec:
      #@overlay/match missing_ok=True
      volumes:
      #@overlay/match by=overlay.subset({"name": "webhook-certs"}),expects="0+"
      #@overlay/remove
      -
      containers:
      #@overlay/match by=overlay.subset({"name": "operator"}),expects="1+"
      -
        #@overlay/match missing_ok=True
        env:
        - name: OPERATOR_SCOPE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['olm.targetNamespaces']
        #! Required to remove the webhook-certs volume mount
        #! because upstream operator has it, and OLM handles
        #! the volume mounts
        #@overlay/match missing_ok=True
        volumeMounts:
        #@overlay/match by=overlay.subset({"name": "webhook-certs"}),expects="0+"
        #@overlay/remove
        -
