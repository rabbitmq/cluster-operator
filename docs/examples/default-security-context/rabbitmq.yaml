apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: default-security-context
  annotations:
    rabbitmq.com/version: "4.3"
spec:
  image: rabbitmq:4.3-management
  override:
    statefulSet:
      spec:
        template:
          spec:
            securityContext: {}
            containers:
            - name: rabbitmq
              securityContext: {}
            initContainers:
            - name: setup-container
              securityContext: {}
