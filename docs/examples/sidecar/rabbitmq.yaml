apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: sidecar
  annotations:
    rabbitmq.com/version: "4.3"
spec:
  image: rabbitmq:4.3-management
  replicas: 1
  override:
    statefulSet:
      spec:
        template:
          spec:
            containers:
            - name: additional-container
              image: busybox
              command: ['sh', '-c', 'echo "Hello, Kubernetes!" && sleep 100']
