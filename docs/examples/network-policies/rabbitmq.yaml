apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: network-policies
  annotations:
    rabbitmq.com/version: "4.3"
spec:
  image: rabbitmq:4.3-management
  replicas: 3
  rabbitmq:
    additionalPlugins:
    - rabbitmq_mqtt
    - rabbitmq_stomp
    - rabbitmq_stream
    - rabbitmq_web_mqtt
    - rabbitmq_web_stomp
