name: Build, Test, Publish Image & Manifest

on:
  push:
    branches: [ "main", "test-ci/*" ]
    paths-ignore:
    - 'docs/**'
    - '*.md'
    - 'LICENSE.txt'
    - 'PROJECT'
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  # Taken from https://github.com/kubernetes-sigs/kind/releases/tag/v0.31.0
  # The image here should be listed under 'Images built for this release' for the version of kind in listed below
  KIND_VERSION: "v0.31.0"
  KIND_NODE_IMAGE: "kindest/node:v1.35.0"
  KIND_OLDEST_NODE_IMAGE: "kindest/node:v1.31.14"
  BASELINE_UPGRADE_VERSION: v2.12.0

jobs:
  kubectl_tests:
    name: kubectl rabbitmq tests
    runs-on: ubuntu-latest
    needs:
      - build_operator
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: kubectl-rabbitmq/go.mod
        cache-dependency-path: |
          kubectl-rabbitmq/go.sum
          kubectl-rabbitmq/go.mod

    - name: Install Carvel
      run: make ytt

    - name: Download Operator artifact
      uses: actions/download-artifact@v8
      with:
        name: operator_image
        path: ${{ runner.temp }}

    - name: Create KinD
      uses: helm/kind-action@v1
      with:
        version: ${{ env.KIND_VERSION }}
        cluster_name: cluster-operator-testing
        node_image: ${{ env.KIND_NODE_IMAGE }}

    - name: Deploy dev Operator
      env:
        IMG: "ghcr.io/rabbitmq/cluster-operator:${{ needs.build_operator.outputs.image_tag }}"
      run: |
        kind load image-archive ${{ runner.temp }}/operator.tar --name cluster-operator-testing
        kustomize build config/namespace/base | kubectl apply -f -
        kustomize build config/default | bin/ytt -f- -f config/ytt/overlay-manager-image.yaml --data-value operator_image="${IMG}" -f config/ytt/never_pull.yaml | kubectl apply -f -

    - name: Test kubectl plugin
      working-directory: kubectl-rabbitmq
      run: make tests TEST_TAGS=integration

    - name: Notify Google Chat
      if: ${{ failure() && github.event_name != 'pull_request' }}
      uses: SimonScholz/google-chat-action@main
      with:
          webhookUrl: '${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}'
          jobStatus: ${{ job.status }}
          title: Cluster Operator - RabbitMQ kubectl tests

  build_kubectl_plugin:
    name: Build kubectl plugin
    runs-on: ubuntu-latest
    needs: kubectl_tests
    if: github.ref_type == 'tag'
    strategy:
      matrix:
        os: [darwin, linux]
        arch: [amd64, arm64]
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: kubectl-rabbitmq/go.mod
        cache-dependency-path: |
          kubectl-rabbitmq/go.sum
          kubectl-rabbitmq/go.mod

    - name: Build kubectl plugin
      working-directory: kubectl-rabbitmq
      run: make build PLUGIN_VERSION=${{ github.ref_name }} GO_OS=${{ matrix.os }} GO_ARCH=${{ matrix.arch }}

    - name: Compress kubectl plugin
      working-directory: kubectl-rabbitmq
      run: tar -cvzf kubectl-rabbitmq-${{ matrix.os }}-${{ matrix.arch }}.tar.gz kubectl-rabbitmq-${{ matrix.os }}-${{ matrix.arch }} ../LICENSE.txt ../README.md

    - name: Upload kubectl plugin artifact
      uses: actions/upload-artifact@v7
      with:
        name: kubectl-rabbitmq-${{ matrix.os }}-${{ matrix.arch }}
        path: kubectl-rabbitmq/kubectl-rabbitmq-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  unit_integration_tests:
    name: unit and integration tests
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Cache tools
      id: cache-tools
      uses: actions/cache@v5
      with:
        path: bin
        key: ${{ runner.os }}-tools-${{ hashFiles('Makefile') }}-${{ hashFiles('go.mod') }}
        restore-keys: |
          ${{ runner.os }}-tools-

    - name: Install tools
      if: steps.cache-tools.outputs.cache-hit != 'true'
      run: make install-tools

    - name: Unit tests
      run: make kubebuilder-assets just-unit-tests

    - name: Integration tests
      run: make just-integration-tests

    - name: Notify Google Chat
      if: ${{ failure() && github.event_name != 'pull_request' }}
      uses: SimonScholz/google-chat-action@main
      with:
          webhookUrl: '${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}'
          jobStatus: ${{ job.status }}
          title: Cluster Operator - Unit and Integration tests

  build_operator:
    name: Build Operator image
    runs-on: ubuntu-latest
    needs: unit_integration_tests
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    permissions:
      contents: 'write'
      packages: 'write'
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Go
      id: set-go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: OCI Metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        # list of Docker images to use as base name for tags
        images: |
          quay.io/rabbitmqoperator/cluster-operator
          ghcr.io/rabbitmq/cluster-operator
        # generate Docker tags based on the following events/attributes
        tags: |
          type=sha
          type=ref,event=pr
          type=semver,pattern={{version}}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Quay.io
      if: ${{ github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') }}
      uses: docker/login-action@v4
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_ROBOT_TOKEN }}

    - name: Login to GHCR
      if: ${{ github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') }}
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@v7
      if: ${{ github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') }}
      with:
        context: .
        platforms: linux/amd64, linux/arm64, linux/ppc64le, linux/s390x
        provenance: false
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # FIXME: mount cache in the container
        # https://github.com/reproducible-containers/buildkit-cache-dance
        # https://docs.docker.com/build/ci/github-actions/cache/#cache-mounts
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          GO_TAG=${{ steps.set-go.outputs.go-version }}

    - name: Build to TAR
      id: build_tar
      uses: docker/build-push-action@v7
      with:
        context: .
        provenance: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        outputs: |
          type=docker,dest=./operator.tar
        # Because we are not pushing this image. Next commit, image will be different, so cache is not useful.
        no-cache: true

    - name: Upload Operator artifact
      uses: actions/upload-artifact@v7
      with:
        name: operator_image
        path: ./operator.tar

    - name: Cache tools
      id: cache-tools
      uses: actions/cache@v5
      with:
        path: bin
        key: ${{ runner.os }}-tools-${{ hashFiles('Makefile') }}-${{ hashFiles('go.mod') }}
        restore-keys: |
          ${{ runner.os }}-tools-

    - name: Install tools
      if: steps.cache-tools.outputs.cache-hit != 'true'
      run: make install-tools

    - name: Build manifest
      env:
        RELEASE_VERSION: ${{ steps.meta.outputs.version }}
      run: make generate-installation-manifest QUAY_IO_OPERATOR_IMAGE=quay.io/rabbitmqoperator/cluster-operator:"${RELEASE_VERSION}" GHCR_IO_OPERATOR_IMAGE=ghcr.io/rabbitmq/cluster-operator:"${RELEASE_VERSION}"

    - name: Upload operator manifests
      uses: actions/upload-artifact@v7
      with:
        name: operator-manifests
        path: releases/cluster-operator*.yml
        retention-days: 2
        if-no-files-found: error

  system_tests:
    name: Local system tests (stable k8s)
    runs-on: ubuntu-latest
    needs: build_operator
    strategy:
      matrix:
        rabbitmq-image:
        - rabbitmq:3.13.7-management
        - rabbitmq:management
        - pivotalrabbitmq/rabbitmq:main-otp27
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Create KinD
      uses: helm/kind-action@v1
      with:
        version: ${{ env.KIND_VERSION }}
        cluster_name: system-testing
        node_image: ${{ env.KIND_NODE_IMAGE }}

    - name: Download Operator manifest
      uses: actions/download-artifact@v8
      # This manifest was generated by the build_operator job, and it has the image tag for this specific execution.
      # Thanks to that, we don't have to make YAML modifications to deploy the right image.
      with:
        name: operator-manifests
        path: tmp/

    - name: Download Operator artifact
      uses: actions/download-artifact@v8
      with:
        name: operator_image
        path: ${{ runner.temp }}/operator-image

    - name: Install Carvel
      uses: carvel-dev/setup-action@v2.2.0
      with:
        only: ytt
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Operator build
      run: |
        kind load image-archive ${{ runner.temp }}/operator-image/operator.tar --name system-testing
        ytt -f tmp/cluster-operator.yml -f config/ytt/never_pull.yaml | kubectl apply -f-
        kubectl --namespace=rabbitmq-system wait --for=condition=Available deployment/rabbitmq-cluster-operator

    - name: System tests
      env:
        KIND_NODE_IMAGE: ${{ env.KIND_NODE_IMAGE }}
        RABBITMQ_IMAGE: ${{ matrix.rabbitmq-image }}
        RABBITMQ_SERVICE_TYPE: NodePort
      # 'make deploy-kind' builds the image locally. We should avoid using that target, because we have already built
      # the image in a previous job
      run: |
        make cert-manager
        SUPPORT_VOLUME_EXPANSION=false make system-tests

    - name: Dry-run example YAMLs
      run: |
        for a in docs/examples/*/*.y*ml; do
          manifest_path="$manifest_path -f $a"
        done
        # The examples are assumed to run in the 'examples' namespace, create if it doesn't exist
        kubectl create namespace examples --dry-run=client -o yaml | kubectl  apply -f -
        kubectl --namespace=examples apply --dry-run=server $manifest_path

  system_tests_oldest_k8s:
    name: Local system tests (min k8s)
    runs-on: ubuntu-latest
    needs: build_operator
    strategy:
      matrix:
        rabbitmq-image:
        - rabbitmq:3.13.7-management
        - rabbitmq:management
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Create KinD
      uses: helm/kind-action@v1
      with:
        version: ${{ env.KIND_VERSION }}
        cluster_name: system-testing-oldest-k8s
        node_image: ${{ env.KIND_OLDEST_NODE_IMAGE }}

    - name: Download Operator artifact
      uses: actions/download-artifact@v8
      with:
        name: operator_image
        path: ${{ runner.temp }}/operator-image

    - name: Download Operator manifest
      uses: actions/download-artifact@v8
      # This manifest was generated by the build_operator job, and it has the image tag for this specific execution.
      # Thanks to that, we don't have to make YAML modifications to deploy the right image.
      with:
        name: operator-manifests
        path: tmp/

    - name: Install Carvel
      uses: carvel-dev/setup-action@v2.2.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        only: ytt

    - name: Install Operator build
      run: |
        kind load image-archive ${{ runner.temp }}/operator-image/operator.tar --name system-testing-oldest-k8s
        ytt -f tmp/cluster-operator.yml -f config/ytt/never_pull.yaml | kubectl apply -f-
        kubectl --namespace=rabbitmq-system wait --for=condition=Available deployment/rabbitmq-cluster-operator

    - name: System tests
      env:
        KIND_NODE_IMAGE: ${{ env.KIND_OLDEST_NODE_IMAGE }}
        RABBITMQ_IMAGE: ${{ matrix.rabbitmq-image }}
        RABBITMQ_SERVICE_TYPE: NodePort
      # make system-tests will install required tools e.g. ginkgo
      run: |
        make cert-manager
        SUPPORT_VOLUME_EXPANSION=false make system-tests

  examples_matrix:
    runs-on: ubuntu-latest
    outputs:
      examples_matrix: ${{ steps.list_examples.outputs.examples_matrix }}
    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: List Examples
      id: list_examples
      run: |
        echo -n 'examples_matrix=' >> $GITHUB_OUTPUT
        find "docs/examples" -mindepth 1 -type d | jq -R -s -c 'split("\n") | map(select(length > 0))' >> $GITHUB_OUTPUT

  test_doc_examples:
    name: Documented example tests
    runs-on: ubuntu-latest
    needs: [build_operator, examples_matrix]
    strategy:
      matrix:
        example: ${{ fromJSON(needs.examples_matrix.outputs.examples_matrix) }}
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Download Operator artifact
      uses: actions/download-artifact@v8
      with:
        name: operator_image
        path: ${{ runner.temp }}/operator-image

    - name: Download Operator manifest
      uses: actions/download-artifact@v8
      # This manifest was generated by the build_operator job, and it has the image tag for this specific execution.
      # Thanks to that, we don't have to make YAML modifications to deploy the right image.
      with:
        name: operator-manifests
        path: tmp/

    - name: Create KinD
      uses: helm/kind-action@v1
      with:
        version: ${{ env.KIND_VERSION }}
        cluster_name: examples-testing
        node_image: ${{ env.KIND_NODE_IMAGE }}

    - name: Install Carvel
      uses: carvel-dev/setup-action@v2.2.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        only: ytt

    - name: Install Operator build
      run: |
        kind load image-archive ${{ runner.temp }}/operator-image/operator.tar --name examples-testing
        ytt -f tmp/cluster-operator.yml -f config/ytt/never_pull.yaml | kubectl apply -f-
        kubectl --namespace=rabbitmq-system wait --for=condition=Available deployment/rabbitmq-cluster-operator

    - name: Documented example ${{ matrix.example }} test
      env:
        example: ${{ matrix.example }}
      run: |
        # Exit early if this example is to be skipped in CI
        [[ -e "$example"/.ci-skip ]] && exit 0

        make cert-manager
        printf "apiVersion: cert-manager.io/v1\nkind: ClusterIssuer\nmetadata:\n  name: selfsigned-issuer\nspec:\n  selfSigned: {}\n" | kubectl apply -f -

        pushd "$example"
          kubectl create namespace examples
          kubectl config set-context --current --namespace=examples
          [[ -e setup.sh ]] && ./setup.sh

          kubectl apply -f rabbitmq.yaml --timeout=30s
          kubectl wait -f rabbitmq.yaml --for=condition=AllReplicasReady --timeout=5m
          kubectl wait -f rabbitmq.yaml --for=condition=ReconcileSuccess --timeout=5m
          ./test.sh
          kubectl delete -f rabbitmq.yaml --timeout=3m
          kubectl delete namespace examples --timeout=10m
        popd

    - name: Notify Google Chat
      if: failure()
      uses: SimonScholz/google-chat-action@main
      with:
          webhookUrl: '${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}'
          jobStatus: ${{ job.status }}
          title: Cluster Operator - Documented example ${{ matrix.example }} test

  test_upgrade:
    name: Test upgrade of the operator
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    needs: build_operator
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Download Operator artifact
      uses: actions/download-artifact@v8
      with:
        name: operator_image
        path: ${{ runner.temp }}/operator-image

    - name: Create KinD
      uses: helm/kind-action@v1
      with:
        version: ${{ env.KIND_VERSION }}
        cluster_name: upgrade-testing
        node_image: ${{ env.KIND_NODE_IMAGE }}

    - name: Install Operator build
      run: |
        kind load image-archive ${{ runner.temp }}/operator-image/operator.tar --name upgrade-testing

    - name: Get operator manifest
      uses: actions/download-artifact@v8
      with:
        name: operator-manifests

    - name: Test upgrade rollout
      run: hack/test-upgrade.sh https://github.com/rabbitmq/cluster-operator/releases/download/${{ env.BASELINE_UPGRADE_VERSION }}/cluster-operator.yml cluster-operator.yml release-header.md

    - name: Upload release header
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: release-header
        path: release-header.md
        retention-days: 2
        if-no-files-found: error

    - name: Notify Google Chat
      if: failure()
      uses: SimonScholz/google-chat-action@main
      with:
          #! Shared-Shared-RabbitMQ%20for%20Kubernetes%2Frabbitmq-ci-google-chat-webhook
          webhookUrl: '${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}'
          jobStatus: ${{ job.status }}
          title: Cluster Operator - Test upgrade

  release:
    name: Release to GitHub Releases
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs: [system_tests, test_doc_examples, test_upgrade, build_kubectl_plugin]
    steps:
    - name: Get operator manifest
      uses: actions/download-artifact@v8
      with:
        name: operator-manifests

    - name: Get kubectl plugin artefacts
      uses: actions/download-artifact@v8
      with:
        pattern: kubectl-rabbitmq-*
        merge-multiple: true
        path: bin/

    - name: Get release header
      uses: actions/download-artifact@v8
      with:
        name: release-header

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          cluster-operator.yml
          cluster-operator-quay-io.yml
          cluster-operator-ghcr-io.yml
          bin/kubectl-rabbitmq-*
        generate_release_notes: true
        draft: true
        body_path: release-header.md
        fail_on_unmatched_files: true

    - name: Notify Google Chat
      if: failure()
      uses: SimonScholz/google-chat-action@main
      with:
          webhookUrl: '${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}'
          jobStatus: ${{ job.status }}
          title: Cluster Operator - Release to GitHub releases
