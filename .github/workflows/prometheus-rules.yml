name: Prometheus Rules Validation

on:
  pull_request:
    paths:
      - 'monitoring/**'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promtool:
    name: Validate Prometheus alert rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install promtool from official Prometheus image
        run: docker pull prom/prometheus:v2.54.1

      - name: Check alert rules (blocking)
        run: |
          set -euo pipefail
          docker run --rm --entrypoint promtool \
            -v "$PWD/monitoring:/monitoring" \
            prom/prometheus:v2.54.1 \
            check rules /monitoring/alerts.yml

      - name: Run rule tests when present
        run: |
          set -euo pipefail
          if compgen -G "monitoring/tests/*.yml" > /dev/null; then
            echo "Found Prometheus rule tests under monitoring/tests/*.yml"
            docker run --rm --entrypoint sh \
              -v "$PWD/monitoring:/monitoring" \
              prom/prometheus:v2.54.1 \
              -c 'promtool test rules /monitoring/tests/*.yml'
          else
            echo "No Prometheus rule test files found under monitoring/tests/*.yml, skipping."
          fi
